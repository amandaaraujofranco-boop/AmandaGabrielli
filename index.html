<!<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo com Imagem!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px; /* Limita a largura do card para melhor visualização da imagem */
        }

        h1 {
            color: #1a73e8;
            margin: 0 0 10px 0; /* Adiciona margem inferior ao h1 */
            font-size: 2.5rem;
        }

        p {
            color: #5f6368;
            margin-bottom: 20px; /* Adiciona margem inferior ao parágrafo */
        }

        .card img { /* Estilo específico para a imagem dentro do card */
            max-width: 100%; /* Garante que a imagem não ultrapasse a largura do card */
            height: auto; /* Mantém a proporção da imagem */
            border-radius: 8px; /* Cantos arredondados para a imagem */
            margin-top: 15px; /* Espaço acima da imagem */
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Olá, Mundo!</h1>
        <p>Meu primeiro projeto com HTML e CSS.</p>
        <img src="https://images.unsplash.com/photo-1502691456952-c0e7ed535850?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w0NTQ4NzJ8MHwxfHNlYXJjaHw0fHxkaWdpdGFsJTIwY29udGVudHxlbnwwfHx8fDE2OTEyNzMwMTd8&ixlib=rb-4.0.3&q=80&w=1080" alt="Exemplo de Conteúdo Digital">
    </div>

</body>
</html>
